<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  
  <!-- Play button circle -->
  <circle cx="400" cy="225" r="60" fill="rgba(59, 130, 246, 0.8)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2"/>
  
  <!-- Play button triangle -->
  <polygon points="380,200 380,250 430,225" fill="white"/>
  
  <!-- Text -->
  <text x="400" y="320" text-anchor="middle" fill="rgba(255, 255, 255, 0.7)" font-family="Arial, sans-serif" font-size="18" font-weight="500">
    Video Preview
  </text>
  
  <!-- Decorative elements -->
  <rect x="50" y="50" width="120" height="8" rx="4" fill="rgba(59, 130, 246, 0.3)"/>
  <rect x="50" y="70" width="80" height="6" rx="3" fill="rgba(59, 130, 246, 0.2)"/>
  
  <rect x="630" y="350" width="120" height="8" rx="4" fill="rgba(59, 130, 246, 0.3)"/>
  <rect x="670" y="370" width="80" height="6" rx="3" fill="rgba(59, 130, 246, 0.2)"/>
</svg>
